# version-sync — drift gate for the two single-source version files.
#
# The repo has two independent version lines, each with ONE source file from
# which every other version string is generated by scripts/sync-version.mjs:
#
#   1. version.json        — the shared TRIO (npm MCP server + bridge + verify)
#   2. hub/version.json    — the Unity Hub Pro desktop app (independent cadence)
#
# Generated targets must never be hand-edited; this workflow fails any PR where
# a generated target has drifted from its source. The fix is always to run the
# sync script (or `bump`), never to edit one file in isolation.
#
# See docs/versioning.md for the full policy.

name: version-sync

on:
  pull_request:
    paths:
      - version.json
      - hub/version.json
      - mcp-server/package.json
      - packages/bridge/package.json
      - packages/verify/package.json
      - packages/bridge/Editor/Bridge/BridgeSession.cs
      - packages/bridge/Editor/Bridge/BridgeHttpServer.cs
      - hub/src-tauri/tauri.conf.json
      - hub/src-tauri/Cargo.toml
      - hub/package.json
      - docs/setup/manual-setup.md
      - docs/setup/agent-setup.md
      - docs/setup/wizard-setup.md
      - docs/api/mcp-tools.md
      - mcp-server/README.md
      - docs/ci/github-actions/unity-verify.yml
      - docs/ci/gitlab-ci/unity-verify.yml
      - scripts/sync-version.mjs
      - .github/workflows/version-sync.yml
      # Token-estimate codegen drift gate — fires when the MCP-server tool
      # schemas or the codegen script change, so the generated
      # BridgeToolTokenEstimates.cs cannot silently drift from its source.
      - mcp-server/src/tools/**
      - mcp-server/src/capabilities/tool-groups.ts
      - scripts/generate-token-estimates.mjs
      - packages/bridge/Editor/UI/BridgeToolTokenEstimates.cs
  push:
    branches: [main, master]
    paths:
      - version.json
      - hub/version.json
      - mcp-server/package.json
      - packages/bridge/package.json
      - packages/verify/package.json
      - packages/bridge/Editor/Bridge/BridgeSession.cs
      - packages/bridge/Editor/Bridge/BridgeHttpServer.cs
      - hub/src-tauri/tauri.conf.json
      - hub/src-tauri/Cargo.toml
      - hub/package.json
      - docs/setup/manual-setup.md
      - docs/setup/agent-setup.md
      - docs/setup/wizard-setup.md
      - docs/api/mcp-tools.md
      - mcp-server/README.md
      - docs/ci/github-actions/unity-verify.yml
      - docs/ci/gitlab-ci/unity-verify.yml

jobs:
  check-trio:
    name: Check shared trio version sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify trio targets match version.json
        # Read-only: --check exits non-zero with a diff if any of the five trio
        # targets (mcp-server/package.json, bridge/verify package.json, the two
        # C# constants) disagree with version.json.
        run: node scripts/sync-version.mjs --check

  check-hub:
    name: Check Hub app version sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Hub targets match hub/version.json
        # Read-only: --check --hub exits non-zero if tauri.conf.json,
        # Cargo.toml, or hub/package.json disagree with hub/version.json.
        run: node scripts/sync-version.mjs --check --hub

  check-token-estimates:
    name: Check token-estimate table sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify generated token-estimate table matches the tool schemas
        # Read-only: --check imports the live MCP-server tool schemas
        # (mcp-server/src/tools/* + tool-groups.ts) via --experimental-strip-types
        # and exits non-zero if the checked-in
        # packages/bridge/Editor/UI/BridgeToolTokenEstimates.cs disagrees. The
        # table is the single source the bridge Tools tab reads for per-tool /
        # per-group / total token estimates; drift would desync the UI from the
        # real catalog.
        run: node --experimental-strip-types scripts/generate-token-estimates.mjs --check
