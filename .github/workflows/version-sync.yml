# version-sync — drift gate for the two single-source version files.
#
# The repo has two independent version lines, each with ONE source file from
# which every other version string is generated by scripts/sync-version.mjs:
#
#   1. version.json        — the shared TRIO (npm MCP server + bridge + verify)
#   2. hub/version.json    — the Unity Hub Pro desktop app (independent cadence)
#
# Generated targets must never be hand-edited; this workflow fails any PR where
# a generated target has drifted from its source. The fix is always to run the
# sync script (or `bump`), never to edit one file in isolation.
#
# See docs/versioning.md for the full policy.

name: version-sync

on:
  pull_request:
    paths:
      - version.json
      - hub/version.json
      - mcp-server/package.json
      - packages/bridge/package.json
      - packages/verify/package.json
      - packages/bridge/Editor/Bridge/BridgeSession.cs
      - packages/bridge/Editor/Bridge/BridgeHttpServer.cs
      - hub/src-tauri/tauri.conf.json
      - hub/src-tauri/Cargo.toml
      - hub/package.json
      - scripts/sync-version.mjs
      - .github/workflows/version-sync.yml
  push:
    branches: [main, master]
    paths:
      - version.json
      - hub/version.json
      - mcp-server/package.json
      - packages/bridge/package.json
      - packages/verify/package.json
      - packages/bridge/Editor/Bridge/BridgeSession.cs
      - packages/bridge/Editor/Bridge/BridgeHttpServer.cs
      - hub/src-tauri/tauri.conf.json
      - hub/src-tauri/Cargo.toml
      - hub/package.json

jobs:
  check-trio:
    name: Check shared trio version sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify trio targets match version.json
        # Read-only: --check exits non-zero with a diff if any of the five trio
        # targets (mcp-server/package.json, bridge/verify package.json, the two
        # C# constants) disagree with version.json.
        run: node scripts/sync-version.mjs --check

  check-hub:
    name: Check Hub app version sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Hub targets match hub/version.json
        # Read-only: --check --hub exits non-zero if tauri.conf.json,
        # Cargo.toml, or hub/package.json disagree with hub/version.json.
        run: node scripts/sync-version.mjs --check --hub
