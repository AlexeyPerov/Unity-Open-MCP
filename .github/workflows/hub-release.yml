name: Hub Release

on:
  push:
    tags:
      - 'hub-v*'

permissions:
  contents: write

jobs:
  # Preflight: refuse to build if the hub-v* tag disagrees with hub/version.json
  # or if any Hub target (tauri.conf.json, Cargo.toml, hub/package.json) has
  # drifted from hub/version.json. Better to fail here in ~20s than after the
  # full macos/windows matrix build. See docs/versioning.md.
  verify-version:
    name: Verify Hub version matches tag + sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Hub targets match hub/version.json
        run: node scripts/sync-version.mjs --check --hub

      - name: Verify tag matches hub/version.json
        run: |
          TAG="${GITHUB_REF_NAME#hub-v}"
          SRC_VERSION=$(node -p "require('./hub/version.json').version")
          echo "Tag version: $TAG"
          echo "hub/version.json: $SRC_VERSION"
          if [ "$TAG" != "$SRC_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match hub/version.json version $SRC_VERSION. Run 'node scripts/sync-version.mjs bump <level> --hub' before tagging."
            exit 1
          fi

  build:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            artifact_name: macos-arm64
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            artifact_name: macos-x64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact_name: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: hub/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: hub/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: hub
        run: npm ci

      - name: Build frontend
        working-directory: hub
        run: npm run build

      - name: Build Tauri app
        working-directory: hub
        run: npm run tauri build -- --target ${{ matrix.rust_target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: hub/src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Unity Hub Pro ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          files: |
            artifacts/**/dmg/*.dmg
            artifacts/**/msi/*.msi
            artifacts/**/nsis/*-setup.exe
