name: Hub Release

on:
  push:
    tags:
      - 'hub-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            artifact_name: macos-arm64
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            artifact_name: macos-x64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact_name: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: hub/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: hub/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: hub
        run: npm ci

      - name: Build frontend
        working-directory: hub
        run: npm run build

      - name: Build Tauri app
        working-directory: hub
        run: npm run tauri build -- --target ${{ matrix.rust_target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: hub/src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Unity Hub Pro ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          files: |
            artifacts/**/dmg/*.dmg
            artifacts/**/msi/*.msi
            artifacts/**/nsis/*-setup.exe
